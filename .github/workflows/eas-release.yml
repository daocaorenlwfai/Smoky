# ── EAS Production Build + Sentry Release ──────────────────
# Triggers a production build on tag push (e.g. v1.0.0).
# Also uploads sourcemaps to Sentry and creates a Sentry release.

name: EAS — Release

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v2.1.3, etc.
  workflow_dispatch:  # allow manual trigger

jobs:
  release:
    name: EAS Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Set version from tag
        run: echo "APP_VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Create Sentry release
        run: |
          npx @sentry/cli releases new $APP_VERSION
          npx @sentry/cli releases finalize $APP_VERSION
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: Trigger EAS Production Build
        run: eas build --platform all --profile production --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Auto-submit to App Store & Play Store
        run: |
          eas submit --platform ios --profile production --non-interactive
          eas submit --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
